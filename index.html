<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tron</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/animation.css" />
</head>



<body>
    <div id="fond-etoiles"></div>

    <div class="main-container">
        <header class="titre-jeu">
            <h1>TRON <span>NEON WARS</span></h1>
            <p>Affrontez votre rival dans l’arène numérique</p>
        </header>

        <div class="scoreboard">
            <!-- Joueur 1 -->
            <div class="player">
                <h2>Joueur 1</h2>
                <div class="player-circle-outer">
                    <div class="player-circle-middle">
                        <div class="player-circle-inner">
                            <p class="score" id="score1">0</p>

                        </div>
                    </div>
                </div>
            </div>
            <!-- Séparateur en + -->
            <div class="score-separator">
                <div class="line vertical"></div>
                <div class="line horizontal"></div>
            </div>
            <div class="player">
                <h2>Joueur 2</h2>
                <div class="player-circle-outer blue">
                    <div class="player-circle-middle blue">
                        <div class="player-circle-inner blue">
                            <p class="score" id="score2">0</p>

                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Canvas pour la grille -->
        <div class="canvas-container">

        </div>

        <!-- Boutons -->
        <div class="buttons-container">
            <button class="btn-new-game">Nouvelle Partie</button>
            <button class="btn-config">Configuration des contrôles</button>
        </div>

        <!-- Commandes de pilotage -->
        <div class="controls-panel">
            <h1>COMMANDE DE PILOTAGE</h1>


            <div class="controls-players">
                <div class="controls-player1">
                    <h3>Cycle Cyan</h3>
                    <div class="gauche cmd">
                        <p>gauche</p>
                        <div class="cmd-gauche ">Q</div>

                    </div>

                    <div class="droite cmd">
                        <p>droite</p>
                        <div class="cmd-droite">W</div>
                    </div>

                    <div class="bas cmd">
                        <p>bas</p>
                        <div class="cmd-droite">D</div>
                    </div>

                    <div class="haut cmd">
                        <p>haut</p>
                        <div class="cmd-droite">Z</div>

                    </div>

                </div>
                <div class="controls-player2">
                    <h3>Cycle Orange </h3>
                    <div class="gauche cmd">
                        <p>gauche</p>
                        <div class="cmd-gauche ">Q</div>

                    </div>

                    <div class="droite cmd">
                        <p>droite</p>
                        <div class="cmd-droite">W</div>
                    </div>

                    <div class="bas cmd">
                        <p>bas</p>
                        <div class="cmd-droite">D</div>
                    </div>

                    <div class="haut cmd">
                        <p>haut</p>
                        <div class="cmd-droite">Z</div>

                    </div>



                </div>
            </div>


</body>

<script src="js/view/Ui.js"></script>
<script type="module" src="js/main.js"></script>

</html>
