<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tron</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/animation.css" />
</head>



<body>
    <div id="fond-etoiles"></div>

    <div class="main-container">
        <header class="titre-jeu">
            <h1>TRON <span>NEON WARS</span></h1>
            <p>Affrontez votre rival dans l’arène numérique</p>
        </header>

        <div class="scoreboard">

            <!-- Joueur 1 -->
            <div class="player">
                <h2>ORANGE CYCLE</h2>
                <div class="player-circle-outer orange">
                    <div class="player-circle-middle orange">
                        <div class="player-circle-inner orange">
                            <p class="score" id="score1">0</p>

                        </div>
                    </div>
                </div>
            </div>
            <!-- Séparateur en + -->
            <div class="score-separator">
                <div class="line vertical"></div>
                <div class="line horizontal"></div>
            </div>
            <div class="player">
                <h2>CYAN CYCLE</h2>
                <div class="player-circle-outer blue">
                    <div class="player-circle-middle blue">
                        <div class="player-circle-inner blue">
                            <p class="score" id="score2">0</p>

                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Canvas pour la grille -->
        <div class="canvas-container">

        </div>

        <!-- Boutons -->
        <div class="buttons-container">
            <button class="btn-new-game">Nouvelle Partie</button>
            <button class="btn-config">Configuration des contrôles</button>
        </div>

        <!-- Commandes de pilotage -->
        <div class="controls-panel">
            <h1>COMMANDE DE PILOTAGE</h1>

            <div class="controls-players">
                <!-- Joueur 1 -->
                <div class="controls-player player-cyan">
                    <h3>Cycle Cyan</h3>
                    <div class="cmd">
                        <p>Gauche</p>
                        <div class="key-cyan">Q</div>
                    </div>
                    <div class="cmd">
                        <p>Droite</p>
                        <div class="key-cyan">D</div>
                    </div>
                    <div class="cmd">
                        <p>Haut</p>
                        <div class="key-cyan">Z</div>
                    </div>
                    <div class="cmd">
                        <p>Bas</p>
                        <div class="key-cyan">S</div>
                    </div>
                    <div class="cmd">
                        <p>Boost</p>
                        <div class="key-cyan">A</div>
                    </div>
                </div>

                <!-- Joueur 2 -->
                <div class="controls-player player-orange">
                    <h3>Cycle Orange</h3>
                    <div class="cmd">
                        <p>Gauche</p>
                        <div class="key-orange">O</div>
                    </div>
                    <div class="cmd">
                        <p>Droite</p>
                        <div class="key-orange">K</div>
                    </div>
                    <div class="cmd">
                        <p>Haut</p>
                        <div class="key-orange">;</div>
                    </div>
                    <div class="cmd">
                        <p>Bas</p>
                        <div class="key-orange">M</div>
                    </div>
                    <div class="cmd">
                        <p>Boost</p>
                        <div class="key-orange">P</div>
                    </div>
                </div>
            </div>
        </div>

</body>


<script src="js/view/Ui.js"></script>
<script type="module" src="js/test.js"></script>

</html>
